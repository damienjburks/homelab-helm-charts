image:
  pullPolicy: Always

api:
  image: prowlercloud/prowler-api
  tag: stable
  port: 8080

ui:
  image: prowlercloud/prowler-ui
  tag: stable
  port: 3000

mcpServer:
  image: prowlercloud/prowler-mcp
  tag: stable
  port: 8000

worker:
  image: prowlercloud/prowler-api
  tag: stable

postgres:
  image: postgres
  tag: 16.3-alpine3.20
  port: 5432
  adminUser: prowler_admin
  adminPassword: postgres
  user: prowler
  password: postgres
  database: prowler_db

valkey:
  image: valkey/valkey
  tag: 7-alpine3.19
  port: 6379
  db: 0

neo4j:
  image: graphstack/dozerdb
  tag: 5.26.3.0
  port: 7687
  user: neo4j
  password: neo4j_password
  pagecacheSize: 1G
  heapInitialSize: 1G
  heapMaxSize: 1G
  maxDatabases: 1000

ingress:
  enabled: true
  className: public
  host: prowler.k8s.internal
  annotations: {}
  tls:
    enabled: true
    secretName: app-internal-tls

persistence:
  existingClaim: smurkscloud-red-pvc

nodeAffinity:
  requiredNodes:
    - dsb-pi5-01
    - dsb-pi5-02

# Name of pre-existing secret containing sensitive keys.
# Created automatically on first install via the keygen job.
existingSecret: prowler-secrets
