apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-mcp
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-mcp
    spec:
      {{- include "prowler.nodeAffinity" . | nindent 6 }}
      containers:
        - name: mcp
          image: "{{ .Values.mcpServer.image }}:{{ .Values.mcpServer.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mcpServer.port }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: PROWLER_MCP_HOST
              value: "0.0.0.0"
          command: ["prowler-mcp", "--transport", "http", "--host", "0.0.0.0", "--port", "8000"]
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mcpServer.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
