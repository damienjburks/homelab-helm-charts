apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-env
type: Opaque
stringData:
  # UI
  PROWLER_UI_VERSION: {{ .Values.ui.tag | quote }}
  AUTH_URL: "https://{{ .Values.ingress.host }}"
  API_BASE_URL: "http://{{ .Release.Name }}-api:{{ .Values.api.port }}/api/v1"
  NEXT_PUBLIC_API_BASE_URL: "https://{{ .Values.ingress.host }}/api/v1"
  NEXT_PUBLIC_API_DOCS_URL: "https://{{ .Values.ingress.host }}/api/v1/docs"
  AUTH_TRUST_HOST: "true"
  UI_PORT: {{ .Values.ui.port | quote }}
  NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID: ""
  NEXT_PUBLIC_PROWLER_RELEASE_VERSION: "stable"

  # MCP
  PROWLER_MCP_VERSION: {{ .Values.mcpServer.tag | quote }}
  PROWLER_MCP_SERVER_URL: "http://{{ .Release.Name }}-mcp:{{ .Values.mcpServer.port }}/mcp"
  PROWLER_MCP_TRANSPORT_MODE: "http"

  # API
  PROWLER_API_VERSION: {{ .Values.api.tag | quote }}

  # Postgres
  POSTGRES_HOST: "{{ .Release.Name }}-postgres"
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_ADMIN_USER: {{ .Values.postgres.adminUser | quote }}
  POSTGRES_ADMIN_PASSWORD: {{ .Values.postgres.adminPassword | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}

  # Neo4j
  NEO4J_HOST: "{{ .Release.Name }}-neo4j"
  NEO4J_PORT: {{ .Values.neo4j.port | quote }}
  NEO4J_USER: {{ .Values.neo4j.user | quote }}
  NEO4J_PASSWORD: {{ .Values.neo4j.password | quote }}
  NEO4J_DBMS_MAX__DATABASES: {{ .Values.neo4j.maxDatabases | quote }}
  NEO4J_SERVER_MEMORY_PAGECACHE_SIZE: {{ .Values.neo4j.pagecacheSize | quote }}
  NEO4J_SERVER_MEMORY_HEAP_INITIAL__SIZE: {{ .Values.neo4j.heapInitialSize | quote }}
  NEO4J_SERVER_MEMORY_HEAP_MAX__SIZE: {{ .Values.neo4j.heapMaxSize | quote }}
  NEO4J_POC_EXPORT_FILE_ENABLED: "true"
  NEO4J_APOC_IMPORT_FILE_ENABLED: "true"
  NEO4J_APOC_IMPORT_FILE_USE_NEO4J_CONFIG: "true"
  NEO4J_PLUGINS: '["apoc"]'
  NEO4J_DBMS_SECURITY_PROCEDURES_ALLOWLIST: "apoc.*"
  NEO4J_DBMS_SECURITY_PROCEDURES_UNRESTRICTED: "apoc.*"
  NEO4J_DBMS_CONNECTOR_BOLT_LISTEN_ADDRESS: "0.0.0.0:{{ .Values.neo4j.port }}"
  ATTACK_PATHS_BATCH_SIZE: "1000"

  # Valkey
  VALKEY_HOST: "{{ .Release.Name }}-valkey"
  VALKEY_PORT: {{ .Values.valkey.port | quote }}
  VALKEY_DB: {{ .Values.valkey.db | quote }}

  # Django
  DJANGO_PORT: {{ .Values.api.port | quote }}
  DJANGO_BIND_ADDRESS: "0.0.0.0"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,{{ .Release.Name }}-api,{{ .Values.ingress.host }}"
  DJANGO_DEBUG: "False"
  DJANGO_SETTINGS_MODULE: "config.django.production"
  DJANGO_LOGGING_FORMATTER: "human_readable"
  DJANGO_LOGGING_LEVEL: "INFO"
  DJANGO_WORKERS: "4"
  DJANGO_ACCESS_TOKEN_LIFETIME: "30"
  DJANGO_REFRESH_TOKEN_LIFETIME: "1440"
  DJANGO_CACHE_MAX_AGE: "3600"
  DJANGO_STALE_WHILE_REVALIDATE: "60"
  DJANGO_MANAGE_DB_PARTITIONS: "True"
  DJANGO_BROKER_VISIBILITY_TIMEOUT: "86400"
  DJANGO_SENTRY_DSN: ""
  DJANGO_THROTTLE_TOKEN_OBTAIN: "50/minute"
  DJANGO_TMP_OUTPUT_DIRECTORY: "/tmp/prowler_api_output"
  DJANGO_FINDINGS_BATCH_SIZE: "1000"
  DJANGO_OUTPUT_S3_AWS_ACCESS_KEY_ID: ""
  DJANGO_OUTPUT_S3_AWS_SECRET_ACCESS_KEY: ""
  DJANGO_OUTPUT_S3_AWS_SESSION_TOKEN: ""
  DJANGO_OUTPUT_S3_AWS_DEFAULT_REGION: ""
  DJANGO_OUTPUT_S3_AWS_OUTPUT_BUCKET: ""

  # Celery
  TASK_RETRY_DELAY_SECONDS: "0.1"
  TASK_RETRY_ATTEMPTS: "5"

  # Sentry
  SENTRY_ENVIRONMENT: "local"
  SENTRY_RELEASE: "local"
  NEXT_PUBLIC_SENTRY_ENVIRONMENT: "local"

  # Social login
  SOCIAL_GOOGLE_OAUTH_CLIENT_ID: ""
  SOCIAL_GOOGLE_OAUTH_CLIENT_SECRET: ""
  SOCIAL_GITHUB_OAUTH_CLIENT_ID: ""
  SOCIAL_GITHUB_OAUTH_CLIENT_SECRET: ""

  # RSS
  RSS_FEED_SOURCES: '[{"id":"prowler-releases","name":"Prowler Releases","type":"github_releases","url":"https://github.com/prowler-cloud/prowler/releases.atom","enabled":true}]'

  # Langsmith
  LANGSMITH_TRACING: "false"
  LANGSMITH_ENDPOINT: "https://api.smith.langchain.com"
  LANGSMITH_API_KEY: ""
  LANGCHAIN_PROJECT: ""
