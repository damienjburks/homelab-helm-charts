        - name: wait-for-postgres
          image: busybox
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-postgres {{ .Values.postgres.port }}; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-valkey
          image: busybox
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-valkey {{ .Values.valkey.port }}; do echo waiting for valkey; sleep 2; done"]
      containers:
        - name: worker-beat
          image: "{{ .Values.worker.image }}:{{ .Values.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
