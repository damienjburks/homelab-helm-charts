apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
    spec:
      {{- include "prowler.nodeAffinity" . | nindent 6 }}
      initContainers:
        - name: set-ulimits
          image: busybox
          command: ["sh", "-c", "ulimit -n 65535"]
          securityContext:
            privileged: true
        - name: wait-for-postgres
          image: busybox
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-postgres {{ .Values.postgres.port }}; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-valkey
          image: busybox
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-valkey {{ .Values.valkey.port }}; do echo waiting for valkey; sleep 2; done"]
      containers:
        - name: worker
          image: "{{ .Values.worker.image }}:{{ .Values.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
            - secretRef:
                name: {{ .Values.existingSecret }}
          command: ["/home/prowler/docker-entrypoint.sh", "worker"]
          securityContext:
            capabilities:
              add: ["SYS_RESOURCE"]
            runAsNonRoot: false
          volumeMounts:
            - name: output
              mountPath: /tmp/prowler_api_output
      volumes:
        - name: output
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker-beat
