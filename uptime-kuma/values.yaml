replicaCount: 1

image:
  repository: louislam/uptime-kuma
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

persistence:
  enabled: true
  storageClass: "microk8s-hostpath"
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /app/data
  existingClaim: ""

ingress:
  className: public
  enabled: true
  host: status.k8s.internal
  annotations: {}
  tls:
    enabled: true
    host: status.k8s.internal
    secretName: app-internal-tls