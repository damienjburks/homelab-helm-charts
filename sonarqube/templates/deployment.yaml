apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      initContainers:
        # SonarQube requires vm.max_map_count >= 524288
        - name: init-sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=524288"]
          securityContext:
            privileged: true
      containers:
        - name: sonarqube
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: SONAR_JDBC_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres:{{ .Values.postgresql.service.port }}/{{ .Values.postgresql.database }}"
            - name: SONAR_JDBC_USERNAME
              value: {{ .Values.postgresql.username | quote }}
            - name: SONAR_JDBC_PASSWORD
              value: {{ .Values.postgresql.password | quote }}
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
              subPath: data
            - name: sonarqube-data
              mountPath: /opt/sonarqube/logs
              subPath: logs
            - name: sonarqube-data
              mountPath: /opt/sonarqube/extensions
              subPath: extensions
      volumes:
        - name: sonarqube-data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.sonarqube.existingClaim | quote }}
